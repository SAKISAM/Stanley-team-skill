name: Skill request
description: Request a new skill, reference module, route, or workflow.
title: "[Skill request]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: scenario
    attributes:
      label: User scenario
      description: What would a user ask, and what should happen?
      placeholder: "Example: I want a workflow for reviewing a 30-day X Analytics export."
    validations:
      required: true
  - type: textarea
    id: current_gap
    attributes:
      label: Current gap
      description: Which current skill fails to cover this, or where does the workflow feel incomplete?
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Public sources or references
      description: Optional. Use public links only; do not include private documents, tokens, account data, or raw capture logs.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: This request does not require fake identity, platform evasion, engagement manipulation, bulk registration, or payout manipulation.
          required: true
