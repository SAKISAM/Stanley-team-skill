name: 问题反馈
description: 反馈路由错误、链接缺失、不安全输出或不可用工作流。
title: "[问题]: "
labels: ["bug"]
body:
  - type: textarea
    id: prompt
    attributes:
      label: 用户提问
      description: 你当时向 Codex 问了什么？
      placeholder: "例如：Use achuan-x-toolkit：怎么检测自己有没有影子封禁？"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      description: 你认为 skill 应该怎么处理？
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 实际发生了什么？请不要包含密钥、账号密码、身份证件或私密客服邮件。
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 模块
      options:
        - 路由
        - 主页
        - 发推节奏
        - 内容系统
        - 回复增长
        - 增长诊断
        - 风险恢复
        - 创作者收益
        - 基础设施
        - 变现路径
        - 工具
        - 保存
        - 文档
    validations:
      required: true
